name: web-deploy
on:
  push:
    branches: [ "main" ]
    tags: [ "web-v*" ]
jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: echo "Deploy staging step here"
  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/web-v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: echo "Deploy prod step here"
