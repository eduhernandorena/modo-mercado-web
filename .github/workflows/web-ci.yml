name: web-ci
on:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "eslint.config.js"
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
